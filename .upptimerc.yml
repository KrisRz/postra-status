# Upptime config — Postra status page (observability.md Tier 0.6)
#
# Upptime dziala W CALOSCI na GitHub: Actions (probe co 5 min, free) + Issues
# (auto-incydenty) + Pages (strona statusu). NIE wymaga zadnej infry AWS.
#
# Setup (patrz README.md obok):
#   1. Stworz PUBLICZNE repo KrisRz/postra-status z szablonu github.com/upptime/upptime
#   2. Wrzuc ten plik do roota tego repo
#   3. Dodaj secret GH_PAT (classic PAT: repo + workflow)
#   4. Wlacz Pages + ustaw DNS status.postra.pl -> KrisRz.github.io

owner: KrisRz
repo: postra-status

sites:
  - name: Postra App (API health)
    url: https://app.postra.pl/api/monitor/queue/main
    # backend liveness — zwraca 200. UWAGA: potwierdz ze endpoint jest publiczny
    # (bez auth) — jesli zwraca 401/403, uzyj https://app.postra.pl/ jako fallback.
  - name: Postra Landing
    url: https://postra.pl
  - name: Postra CDN
    # CloudFront cdn-dev.postra.pl; root has no default object, so the edge
    # answers 403 when healthy — both codes mean "CDN up".
    url: https://cdn-dev.postra.pl
    expectedStatusCodes:
      - 200
      - 403

status-website:
  cname: status.postra.pl
  name: Postra Status
  introTitle: "Postra — service status"
  introMessage: "Current availability of app.postra.pl and related services."
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/KrisRz/postra-status

assignees:
  - KrisRz

# Probe domyslnie co 5 min. Powiadomienia: domyslnie GitHub Issues.
# Opcjonalnie Telegram/Slack/email — sekcja `notifications:` (patrz Upptime docs).
